# FTP Server: 185.28.21.100 (v2)
name: Deploy to Hostinger
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Build Site
        run: npm run build
      # Note: Vite automatically copies everything from public/ (including PHP files and .htaccess) to dist/ during build.
      # Removed redundant manual cp commands that were breaking the build.

      - name: Validate Configuration
        run: |
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then echo "✅ Found FTP_SERVER"; fi
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then echo "❌ FTP_SERVER missing"; exit 1; fi
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
