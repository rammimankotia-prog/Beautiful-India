# FTP Server: ftp.bhaktikishakti.com
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Site
        run: npm run build

      - name: Validate Configuration
        run: |
          echo "Scanning for FTP_SERVER..."
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then echo "✅ Found FTP_SERVER in SECRETS"; fi
          if [ -n "${{ vars.FTP_SERVER }}" ]; then echo "⚠️ Found FTP_SERVER in VARIABLES (This is incorrect, it must be a Secret)"; fi
          
          if [ -n "${{ secrets.FTP_USERNAME }}" ]; then echo "✅ Found FTP_USERNAME in SECRETS"; fi
          if [ -n "${{ vars.FTP_USERNAME }}" ]; then echo "⚠️ Found FTP_USERNAME in VARIABLES"; fi
          
          if [ -z "${{ secrets.FTP_SERVER }}" ] && [ -z "${{ vars.FTP_SERVER }}" ]; then
            echo "❌ FTP_SERVER is completely missing from both Secrets and Variables."
            exit 1
          fi

      - name: Diagnostic Connection Check
        run: |
          echo "Testing DNS resolution for ${{ secrets.FTP_SERVER }}..."
          nslookup ${{ secrets.FTP_SERVER }} || echo "DNS Lookup failed"
          ping -c 3 ${{ secrets.FTP_SERVER }} || echo "Ping failed (expected on some servers)"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
